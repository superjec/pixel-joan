<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>★ PIXEL AGENTS ★</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #080510;
      --bg2:   #0e0a1a;
      --bg3:   #130d22;
      --border:#2a1f4a;
      --text:  #e8d5ff;
      --dim:   #5a4a7a;

      --reviewer:   #00ff9d;
      --resolver:   #ff6b35;
      --architect:  #4fc3f7;
      --planner:    #ce93d8;
      --tester:     #fff176;
      --optimizer:  #ff4081;
      --analyzer:   #40c4ff;
      --operator:   #69f0ae;
      --opensource: #ffab40;
      --gan:        #e040fb;
      --network:    #00e5ff;
      --security:   #ff1744;
      --docs:       #b2ff59;
      --healthcare: #f48fb1;
      --specialized:#ff6e40;

      --opus:   #ffd700;
      --sonnet: #00e5ff;
      --haiku:  #ff4fff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Pixel grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 16px 16px;
      pointer-events: none;
      z-index: 0;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.12) 3px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Stars */
    .star {
      position: fixed;
      width: 2px;
      height: 2px;
      background: #fff;
      pointer-events: none;
      z-index: 0;
      animation: twinkle var(--d, 3s) var(--delay, 0s) infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity:.1; }
      50%      { opacity:.8; }
    }

    /* ── Sticky wrapper ── */
    #sticky {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
    }

    /* ── Header ── */
    #header {
      padding: 20px 32px 14px;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .pixel-title {
      font-size: 20px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #ff4fff 0%, #00e5ff 50%, #ff4fff 100%);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0%   50%; }
      100% { background-position: 200% 50%; }
    }

    .cursor {
      display: inline-block;
      width: 10px; height: 18px;
      background: var(--sonnet);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .stats-bar {
      display: flex;
      gap: 20px;
      font-size: 7px;
      color: var(--dim);
      flex-wrap: wrap;
    }
    .stats-bar b { color: var(--sonnet); }

    /* ── Controls ── */
    #controls {
      padding: 10px 32px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-top: 1px solid var(--border);
    }

    .search-wrap {
      position: relative;
      flex: 0 0 240px;
    }
    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      font-size: 12px;
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--bg2);
      border: 2px solid var(--border);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 7px 8px 7px 26px;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus {
      border-color: var(--sonnet);
      box-shadow: 0 0 8px rgba(0,229,255,.2);
    }
    #search::placeholder { color: var(--dim); }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .filter-btn {
      background: var(--bg2);
      border: 1px solid currentColor;
      color: var(--dim);
      font-family: 'Press Start 2P', monospace;
      font-size: 5px;
      padding: 4px 7px;
      cursor: pointer;
      transition: all .12s;
      letter-spacing: .5px;
      opacity: .7;
    }
    .filter-btn:hover { opacity: 1; color: var(--text); border-color: var(--text); }
    .filter-btn.active {
      background: var(--active-col, var(--sonnet));
      border-color: var(--active-col, var(--sonnet));
      color: #080510;
      opacity: 1;
    }
    .filter-btn .cnt {
      opacity: .7;
      margin-left: 3px;
    }

    /* ── Grid ── */
    #grid {
      position: relative;
      z-index: 1;
      padding: 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
      gap: 14px;
    }

    /* ── Card ── */
    .agent-card {
      background: var(--bg2);
      border: 2px solid var(--cc, var(--border));
      position: relative;
      overflow: hidden;
      animation: fadeUp .3s ease forwards;
      opacity: 0;
      transition: transform .1s, box-shadow .2s;
    }
    .agent-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,.6),
                  0 0 20px color-mix(in srgb, var(--cc) 25%, transparent);
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Pixel corner accents */
    .agent-card::before,
    .agent-card::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      background: var(--cc, var(--border));
    }
    .agent-card::before { top:0; right:0; }
    .agent-card::after  { bottom:0; left:0; }

    /* Inner corner top-left */
    .corner-tl, .corner-br {
      position: absolute;
      width: 6px; height: 6px;
      background: var(--cc, var(--border));
      z-index: 2;
    }
    .corner-tl { top:0;    left:0; }
    .corner-br { bottom:0; right:0; }

    .card-top {
      padding: 16px 14px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .sprite-wrap {
      flex-shrink: 0;
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sprite-wrap svg {
      image-rendering: pixelated;
      animation: glow 2.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 3px var(--cc)); }
      50%      { filter: drop-shadow(0 0 10px var(--cc)) drop-shadow(0 0 20px var(--cc)); }
    }

    .card-meta { flex: 1; min-width: 0; }

    .agent-name {
      font-size: 7.5px;
      color: var(--cc, var(--text));
      line-height: 1.6;
      word-break: break-word;
      margin-bottom: 7px;
      letter-spacing: .5px;
    }

    .badge-row { display: flex; gap: 4px; flex-wrap: wrap; }

    .badge {
      font-size: 5px;
      padding: 2px 5px;
      letter-spacing: .8px;
      font-family: 'Press Start 2P', monospace;
      white-space: nowrap;
    }
    .badge-model { border: 1px solid; }
    .badge-model.opus   { color: var(--opus);   border-color: var(--opus); }
    .badge-model.sonnet { color: var(--sonnet); border-color: var(--sonnet); }
    .badge-model.haiku  { color: var(--haiku);  border-color: var(--haiku); }
    .badge-cat { background: var(--cc); color: #080510; }

    .card-desc {
      padding: 9px 14px;
      font-size: 5.5px;
      color: var(--dim);
      line-height: 2;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      min-height: 52px;
    }

    .card-tools {
      padding: 7px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .tool-tag {
      font-size: 4.5px;
      padding: 2px 4px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      color: var(--dim);
      letter-spacing: .3px;
    }

    /* No results */
    .no-results {
      display: none;
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--dim);
      line-height: 3;
    }
    .no-results.show { display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--dim); }
  </style>
</head>

// ── Render SVG sprite ──────────────────────────────────────────────────────
function renderSprite(key, color, px = 5) {
  const rows = SPRITES[key] || SPRITES.specialized;
  const dim = px * 8;
  const rects = rows.flatMap((row, y) =>
    [...row].map((bit, x) =>
      bit === '1'
        ? `<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}" fill="${color}"/>`
        : ''
    )
  ).join('');
  return `<svg width="${dim}" height="${dim}" viewBox="0 0 ${dim} ${dim}" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
}

// ── Build card element ─────────────────────────────────────────────────────
function buildCard(agent, delay) {
  const cat = getCategory(agent.name);
  const { color, sprite, label } = CATS[cat] || CATS.specialized;

  const card = document.createElement('div');
  card.className = 'agent-card';
  card.style.cssText = `--cc:${color}; animation-delay:${delay}ms`;
  card.dataset.cat = cat;
  card.dataset.q   = (agent.name + ' ' + agent.desc + ' ' + agent.tools.join(' ')).toLowerCase();

  card.innerHTML = `
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
    <div class="card-top">
      <div class="sprite-wrap" style="--cc:${color}">
        ${renderSprite(sprite, color, 5)}
      </div>
      <div class="card-meta">
        <div class="agent-name">${agent.name}</div>
        <div class="badge-row">
          <span class="badge badge-model ${agent.model}">${agent.model.toUpperCase()}</span>
          <span class="badge badge-cat">${label}</span>
        </div>
      </div>
    </div>
    <div class="card-desc">${agent.desc}</div>
    <div class="card-tools">
      ${agent.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}
    </div>
  `;
  return card;
}

// ── Stars ──────────────────────────────────────────────────────────────────
function initStars(n = 60) {
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left  = Math.random() * 100 + 'vw';
    s.style.top   = Math.random() * 100 + 'vh';
    s.style.setProperty('--d',     (2 + Math.random() * 5).toFixed(1) + 's');
    s.style.setProperty('--delay', (Math.random() * 5).toFixed(1) + 's');
    document.body.appendChild(s);
  }
}

// ── Filter ─────────────────────────────────────────────────────────────────
let activeCat = 'all';
let query     = '';

function applyFilters() {
  const cards = document.querySelectorAll('.agent-card');
  let n = 0;
  cards.forEach(c => {
    const ok = (activeCat === 'all' || c.dataset.cat === activeCat) &&
               (!query || c.dataset.q.includes(query));
    c.style.display = ok ? '' : 'none';
    if (ok) n++;
  });
  document.getElementById('show-count').textContent = n;
  document.getElementById('no-results').classList.toggle('show', n === 0);
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  initStars();

  // Counts
  const counts = { opus:0, sonnet:0, haiku:0 };
  AGENTS.forEach(a => counts[a.model] = (counts[a.model] || 0) + 1);
  document.getElementById('total-count').textContent  = AGENTS.length;
  document.getElementById('show-count').textContent   = AGENTS.length;
  document.getElementById('opus-count').textContent   = counts.opus;
  document.getElementById('sonnet-count').textContent = counts.sonnet;
  document.getElementById('haiku-count').textContent  = counts.haiku || 0;

  // Category counts
  const catCounts = {};
  AGENTS.forEach(a => {
    const c = getCategory(a.name);
    catCounts[c] = (catCounts[c] || 0) + 1;
  });

  // Filter buttons
  const fg = document.getElementById('filters');

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.dataset.cat = 'all';
  allBtn.style.setProperty('--active-col', '#00e5ff');
  allBtn.style.color = '#00e5ff';
  allBtn.innerHTML = `ALL <span class="cnt">(${AGENTS.length})</span>`;
  allBtn.addEventListener('click', () => setFilter('all', allBtn));
  fg.appendChild(allBtn);

  const usedCats = Object.keys(catCounts).sort();
  usedCats.forEach(cat => {
    const { label, color } = CATS[cat];
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.style.setProperty('--active-col', color);
    btn.style.color = color;
    btn.innerHTML = `${label} <span class="cnt">(${catCounts[cat]})</span>`;
    btn.addEventListener('click', () => setFilter(cat, btn));
    fg.appendChild(btn);
  });

  function setFilter(cat, btn) {
    activeCat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  // Search
  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value.toLowerCase().trim();
    applyFilters();
  });

  // Render cards
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');
  AGENTS.forEach((agent, i) => {
    const card = buildCard(agent, i * 25);
    grid.insertBefore(card, noResults);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
